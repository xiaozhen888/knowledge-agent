server:
  port: 8080

spring:
  application:
    name: knowledge-agent

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # MySQL配置
  datasource:
    url: jdbc:mysql://mysql:3306/knowledge_agent?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: mysql666@
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

# 大模型API配置
langchain4j:
  openai:
    api-key: ${DEEPSEEK_API_KEY}
    base-url: https://api.deepseek.com/v1
    model-name: deepseek-chat