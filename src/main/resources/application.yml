server:
  port: 8080

spring:
  application:
    name: knowledge-agent

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # MySQL配置
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/knowledge_agent?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# 大模型API配置
langchain4j:
  openai:
    api-key: ${DEEPSEEK_API_KEY}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    model-name: ${DEEPSEEK_MODEL:deepseek-chat}

reranker:
  model:
    max-length: 256
  batch-size: 32

# 文件存储路径
app:
  storage:
    path: ${FILE_STORAGE_PATH:/data/files}
  # API鉴权（空则不校验）
  auth:
    api-key: ${API_KEY:}