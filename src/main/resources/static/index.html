<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能知识库助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { color: #333; font-size: 28px; margin-bottom: 8px; }
        .header p { color: #666; }

        .upload-area { background: white; border-radius: 12px; padding: 30px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .upload-area h3 { margin-bottom: 15px; color: #333; }
        .file-input-wrapper { display: flex; gap: 10px; align-items: center; }
        #fileInput { flex: 1; padding: 10px; border: 2px dashed #ddd; border-radius: 8px; cursor: pointer; }
        #uploadBtn { padding: 10px 24px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        #uploadBtn:hover { background: #4338ca; }
        #uploadStatus { margin-top: 10px; font-size: 14px; color: #666; }

        .chat-area { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        .chat-header { padding: 20px; border-bottom: 1px solid #eee; }
        .chat-header h3 { color: #333; }
        #sessionId { color: #4f46e5; font-size: 13px; margin-top: 5px; }

        .messages { height: 450px; overflow-y: auto; padding: 20px; background: #fafafa; }
        .message { margin-bottom: 16px; display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .message .bubble { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .message.user .bubble { background: #4f46e5; color: white; border-bottom-right-radius: 4px; }
        .message.assistant .bubble { background: white; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
        .message .label { font-size: 12px; color: #999; margin-bottom: 4px; }

        .input-area { display: flex; padding: 20px; gap: 10px; border-top: 1px solid #eee; }
        #questionInput { flex: 1; padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
        #questionInput:focus { border-color: #4f46e5; }
        #sendBtn { padding: 12px 24px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        #sendBtn:hover { background: #4338ca; }
        #sendBtn:disabled { background: #a5b4fc; cursor: not-allowed; }

        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        mark {
            background-color: #fef08a;
            color: #000;
            padding: 1px 3px;
            border-radius: 2px;
        }

        .source-box {
            margin-top: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            max-width: 100%;
        }
        .source-header {
            background: #f3f4f6;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            color: #374151;
            border-bottom: 1px solid #e5e7eb;
        }
        .source-tabs {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: #fafafa;
            border-bottom: 1px solid #e5e7eb;
        }
        .source-tab {
            padding: 4px 12px;
            border: 1px solid #d1d5db;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: #6b7280;
        }
        .source-tab.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        .source-panel {
            padding: 12px;
            font-size: 13px;
            color: #333;
            line-height: 1.8;
            background: #fffef5;
            max-height: 200px;
            overflow-y: auto;
        }

        .feedback-btns {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .fb-btn {
            background: none;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .fb-btn:hover {
            background: #f3f4f6;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 智能知识库助手</h1>
        <p>基于RAG架构的文档问答系统</p>
    </div>

    <div class="upload-area">
        <h3>📄 上传文档</h3>
        <div class="file-input-wrapper">
            <input type="file" id="fileInput" accept=".pdf,.docx,.md,.txt">
            <button id="uploadBtn" onclick="uploadDocument()">上传并解析</button>
        </div>
        <div id="uploadStatus"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <h3>💬 知识库对话</h3>
            <div id="sessionId">会话ID: 自动生成</div>
        </div>
        <div class="messages" id="messages">
            <div class="message assistant">
                <span class="label">助手</span>
                <div class="bubble">你好！请先上传一份PDF文档，然后向我提问。</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="questionInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>
</div>

<script>
    // 生成随机会话ID
    const sessionId = 'session-' + Math.random().toString(36).substring(2, 10);
    document.getElementById('sessionId').textContent = '会话ID: ' + sessionId;

    // 上传文档
    async function uploadDocument() {
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('uploadStatus');

        if (!fileInput.files[0]) {
            statusDiv.textContent = '请先选择文件';
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        statusDiv.innerHTML = '<span class="loading"></span> 正在上传并解析...';

        try {
            const res = await fetch('/api/document/upload', { method: 'POST', body: formData });
            const text = await res.text();
            statusDiv.innerHTML = '✅ ' + text;
        } catch (e) {
            statusDiv.textContent = '❌ 上传失败: ' + e.message;
        }
    }

    // 发送消息
    async function sendMessage() {
        const input = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const question = input.value.trim();

        if (!question) return;

        addMessage('user', question);
        input.value = '';
        sendBtn.disabled = true;
        sendBtn.textContent = '思考中...';

        const loadingId = addLoadingMessage();

        try {
            const res = await fetch('/api/chat/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId, question: question })
            });
            const answer = await res.text();
            removeMessage(loadingId);
            addMessage('assistant', answer);
        } catch (e) {
            removeMessage(loadingId);
            addMessage('assistant', '抱歉，请求失败: ' + e.message);
        }

        sendBtn.disabled = false;
        sendBtn.textContent = '发送';
    }

    function addMessage(role, content) {
        const messagesDiv = document.getElementById('messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + role;

        let mainAnswer = content;
        let sourcePart = '';
        const separatorIndex = content.indexOf('\n\n---\n📚 **参考来源**\n');

        if (separatorIndex !== -1) {
            mainAnswer = content.substring(0, separatorIndex);
            sourcePart = content.substring(separatorIndex);
        }

        mainAnswer = mainAnswer.replace(/【(.+?)】/g, '<mark>$1</mark>');

        let sourceHtml = '';
        if (sourcePart) {
            let sourceText = sourcePart.replace('📚 **参考来源**\n', '');
            const segments = sourceText.split(/\*\*片段\d+：\*\*/).filter(s => s.trim());
            const titles = sourceText.match(/\*\*片段\d+：\*\*/g) || [];

            sourceHtml = '<div class="source-box">';
            sourceHtml += '<div class="source-header">📚 参考来源</div>';
            sourceHtml += '<div class="source-tabs">';

            for (let i = 0; i < segments.length; i++) {
                sourceHtml += `<button class="source-tab ${i === 0 ? 'active' : ''}" onclick="switchSource(this, 'source-${msgDiv._id}-${i}')">片段${i + 1}</button>`;
            }
            sourceHtml += '</div>';

            for (let i = 0; i < segments.length; i++) {
                let segment = segments[i].trim();
                segment = segment.replace(/【(.+?)】/g, '<mark>$1</mark>');
                sourceHtml += `<div id="source-${msgDiv._id}-${i}" class="source-panel" style="display:${i === 0 ? 'block' : 'none'}">${segment.replace(/\n/g, '<br>')}</div>`;
            }
            sourceHtml += '</div>';
        }

        const msgId = 'msg-' + Date.now();
        msgDiv._id = msgId;

        msgDiv.innerHTML = `
            <span class="label">${role === 'user' ? '你' : '助手'}</span>
            <div class="bubble">${mainAnswer.replace(/\n/g, '<br>')}</div>
            ${sourceHtml}
        `;

        if (role === 'assistant' && !content.startsWith('你好')) {
            const allMessages = messagesDiv.querySelectorAll('.message.user');
            const lastUserMsg = allMessages[allMessages.length - 1];
            const question = lastUserMsg ? lastUserMsg.querySelector('.bubble').textContent : '';

            const btnDiv = document.createElement('div');
            btnDiv.className = 'feedback-btns';

            const likeBtn = document.createElement('button');
            likeBtn.className = 'fb-btn';
            likeBtn.title = '有帮助';
            likeBtn.textContent = '👍';
            likeBtn.onclick = function() {
                submitFeedback(sessionId, question, mainAnswer, 'like', this);
            };

            const dislikeBtn = document.createElement('button');
            dislikeBtn.className = 'fb-btn';
            dislikeBtn.title = '没帮助';
            dislikeBtn.textContent = '👎';
            dislikeBtn.onclick = function() {
                submitFeedback(sessionId, question, mainAnswer, 'dislike', this);
            };

            btnDiv.appendChild(likeBtn);
            btnDiv.appendChild(dislikeBtn);
            msgDiv.appendChild(btnDiv);
        }

        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function switchSource(btn, panelId) {
        const box = btn.closest('.source-box');
        box.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        box.querySelectorAll('.source-panel').forEach(p => p.style.display = 'none');
        document.getElementById(panelId).style.display = 'block';
    }

    function addLoadingMessage() {
        const messagesDiv = document.getElementById('messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message assistant';
        msgDiv.id = 'loading-msg';
        msgDiv.innerHTML = '<span class="label">助手</span><div class="bubble"><span class="loading"></span> 正在检索并生成回答...</div>';
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return 'loading-msg';
    }

    function removeMessage(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML.replace(/\n/g, '<br>');
    }

    function escapeJs(str) {
        return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
    }

    async function submitFeedback(sessionId, question, answer, rating, btn) {
        try {
            await fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId, question: question, answer: answer, rating: rating })
            });
            btn.textContent = '✅';
            btn.disabled = true;
            btn.parentElement.querySelectorAll('.fb-btn').forEach(b => b.disabled = true);
        } catch (e) {
            alert('反馈提交失败');
        }
    }
</script>
</body>
</html>
