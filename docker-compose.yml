services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysql666@
      MYSQL_DATABASE: knowledge_agent
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  knowledge-agent:
    build: .
    container_name: knowledge-agent
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/knowledge_agent?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=mysql666@
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JAVA_OPTS=-Xmx1024m
    deploy:
      resources:
        limits:
          memory: 2048M
    volumes:
      - knowledge_files:/data/files
      - ./models/reranker:/app/models/reranker:ro
    depends_on:
      - redis
      - rabbitmq
      - mysql
    restart: always

volumes:
  mysql_data:
  knowledge_files: